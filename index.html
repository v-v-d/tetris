<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-info">
            <h1>Tetris</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">Счет:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">Уровень:</span>
                    <span id="level" class="value">1</span>
                </div>
                <div class="score-item">
                    <span class="label">Линии:</span>
                    <span id="lines" class="value">0</span>
                </div>
            </div>
            <div class="next-piece">
                <span class="label">Следующая:</span>
                <canvas id="next-piece" width="100" height="100"></canvas>
            </div>
            <div class="controls">
                <button id="start-button">Начать</button>
                <button id="pause-button">Пауза</button>
                <button id="restart-button">Заново</button>
            </div>
            <div class="instructions">
                <h3>Управление:</h3>
                <p>← → - Движение</p>
                <p>↑ - Поворот</p>
                <p>↓ - Ускорение</p>
                <p>Пробел - Сброс</p>
            </div>
        </div>
        <div class="game-board">
            <canvas id="game-board" width="300" height="600"></canvas>
            <div id="game-over" class="game-over hidden">
                <h2>Игра окончена!</h2>
                <p>Ваш счет: <span id="final-score">0</span></p>
            </div>
            <div id="paused" class="paused hidden">
                <h2>Пауза</h2>
            </div>
        </div>
    </div>

    <!-- Domain Layer -->
    <script src="domain/value-objects/Position.js"></script>
    <script src="domain/value-objects/Shape.js"></script>
    <script src="domain/value-objects/Color.js"></script>
    <script src="domain/entities/Tetromino.js"></script>
    <script src="domain/entities/GameBoard.js"></script>
    <script src="domain/services/RotationService.js"></script>
    <script src="domain/services/CollisionService.js"></script>
    <script src="domain/services/LineClearService.js"></script>
    <script src="domain/repositories/GameRepository.js"></script>

    <!-- Application Layer -->
    <script src="application/ScoreCalculator.js"></script>
    <script src="application/GameState.js"></script>
    <script src="application/GameService.js"></script>

    <!-- Infrastructure Layer -->
    <script src="infrastructure/repositories/InMemoryGameRepository.js"></script>
    <script src="infrastructure/renderers/CanvasRenderer.js"></script>
    <script src="infrastructure/input/KeyboardInputHandler.js"></script>

    <!-- Presentation Layer -->
    <script src="presentation/GameController.js"></script>

    <!-- Entry Point -->
    <script src="main.js"></script>
</body>
</html>
